<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@300..700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* === TOKENS === */
:root, [data-theme="light"] {
  --color-bg: #f5f4ee;
  --color-surface: #faf9f5;
  --color-surface-2: #ffffff;
  --color-surface-offset: #edeae3;
  --color-surface-dynamic: #e4e0d8;
  --color-divider: #dbd8cf;
  --color-border: #ccc9c0;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #b0ae9f;
  --color-text-inverse: #f9f8f4;
  --color-primary: #3a7a45;
  --color-primary-hover: #2d6036;
  --color-primary-active: #1e4224;
  --color-primary-highlight: #d0e5d4;
  --color-success: #437a22;
  --color-success-highlight: #d4dfcc;
  --color-gold: #c08a00;
  --color-gold-highlight: #ede6c6;
  --color-orange: #c05800;
  --color-orange-highlight: #f0dece;
  --color-blue: #006494;
  --color-blue-highlight: #c6d8e4;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.09);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.13);
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'Work Sans', system-ui, sans-serif;
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
  --space-5: 1.25rem; --space-6: 1.5rem; --space-8: 2rem; --space-10: 2.5rem;
  --space-12: 3rem; --space-16: 4rem;
  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}
[data-theme="dark"] {
  --color-bg: #171614; --color-surface: #1e1d1b; --color-surface-2: #242220;
  --color-surface-offset: #1a1917; --color-surface-dynamic: #2a2926;
  --color-divider: #2e2c29; --color-border: #3a3835;
  --color-text: #d2d0cc; --color-text-muted: #7a7876; --color-text-faint: #504e4c;
  --color-text-inverse: #2b2a28;
  --color-primary: #5fa86c; --color-primary-hover: #3f8a4f; --color-primary-active: #2a6639;
  --color-primary-highlight: #2a3a2d;
  --color-success: #6daa45; --color-success-highlight: #2e3f25;
  --color-gold: #e8af34; --color-gold-highlight: #3d3620;
  --color-orange: #f0883a; --color-orange-highlight: #3e2e1e;
  --color-blue: #5591c7; --color-blue-highlight: #1d2e3d;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.45);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --color-bg: #171614; --color-surface: #1e1d1b; --color-surface-2: #242220;
    --color-surface-offset: #1a1917; --color-surface-dynamic: #2a2926;
    --color-divider: #2e2c29; --color-border: #3a3835;
    --color-text: #d2d0cc; --color-text-muted: #7a7876; --color-text-faint: #504e4c;
  }
}

/* === BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; scroll-padding-top: 80px; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); line-height: 1.6; }
img, svg { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a, button, [role="button"] { transition: color var(--transition), background var(--transition), box-shadow var(--transition); }
h1,h2,h3,h4 { font-family: var(--font-display); line-height: 1.2; text-wrap: balance; }
p, li { text-wrap: pretty; max-width: 72ch; }

/* === LAYOUT === */
.app { display: flex; flex-direction: column; min-height: 100dvh; }
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-3) var(--space-6);
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm);
  gap: var(--space-4);
}
.topbar-logo {
  display: flex; align-items: center; gap: var(--space-3);
}
.logo-mark { color: var(--color-primary); }
.logo-text { font-family: var(--font-display); font-size: var(--text-lg); color: var(--color-text); }
.topbar-actions { display: flex; align-items: center; gap: var(--space-2); }
.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: var(--radius-md);
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }

.main { display: flex; flex: 1; }
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  padding: var(--space-4) var(--space-3);
  display: flex; flex-direction: column; gap: var(--space-1);
  position: sticky; top: 53px; height: calc(100dvh - 53px); overflow-y: auto;
}
.sidebar-label {
  font-size: var(--text-xs); font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--color-text-faint);
  padding: var(--space-3) var(--space-2) var(--space-1);
  margin-top: var(--space-3);
}
.sidebar-label:first-child { margin-top: 0; }
.plant-btn {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  font-size: var(--text-sm); color: var(--color-text-muted);
  text-align: left; width: 100%;
  transition: background var(--transition), color var(--transition);
  position: relative;
}
.plant-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.plant-btn.active { background: var(--color-primary-highlight); color: var(--color-primary); font-weight: 600; }
.plant-dot {
  width: 8px; height: 8px; border-radius: var(--radius-full); flex-shrink: 0;
}
.plant-status-dot {
  width: 7px; height: 7px; border-radius: var(--radius-full);
  position: absolute; right: var(--space-2);
  flex-shrink: 0;
}

.content { flex: 1; padding: var(--space-8) var(--space-8); overflow-x: hidden; max-width: 1000px; }

/* === KPI STRIP === */
.kpi-strip { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-8); }
.kpi-card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-4) var(--space-5);
  box-shadow: var(--shadow-sm);
}
.kpi-label { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-1); }
.kpi-value { font-family: var(--font-display); font-size: var(--text-xl); font-variant-numeric: tabular-nums; color: var(--color-text); line-height: 1; margin-bottom: var(--space-1); }
.kpi-delta { font-size: var(--text-xs); font-weight: 500; display: flex; align-items: center; gap: 3px; }
.delta-up { color: var(--color-success); }
.delta-neutral { color: var(--color-text-faint); }

/* === PLANT HEADER === */
.plant-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: var(--space-6); gap: var(--space-4);
  flex-wrap: wrap;
}
.plant-title { font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-text); }
.plant-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-1); }
.status-badge {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 600;
}
.badge-growing { background: var(--color-primary-highlight); color: var(--color-primary); }
.badge-harvesting { background: var(--color-gold-highlight); color: var(--color-gold); }
.badge-done { background: var(--color-success-highlight); color: var(--color-success); }
.badge-seedling { background: var(--color-blue-highlight); color: var(--color-blue); }

/* === GRID === */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); margin-bottom: var(--space-6); }
.full-col { margin-bottom: var(--space-6); }
@media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }

/* === CARDS === */
.card {
  background: var(--color-surface); border: 1px solid var(--color-border);
  border-radius: var(--radius-lg); padding: var(--space-5);
  box-shadow: var(--shadow-sm);
}
.card-title { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--space-4); display: flex; align-items: center; gap: var(--space-2); }
.card-title i { color: var(--color-primary); }

/* === TIMELINE === */
.timeline { display: flex; flex-direction: column; gap: 0; }
.timeline-item { display: flex; gap: var(--space-3); position: relative; padding-bottom: var(--space-4); }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-track { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 20px; }
.timeline-dot {
  width: 10px; height: 10px; border-radius: var(--radius-full); flex-shrink: 0;
  border: 2px solid var(--color-surface); z-index: 1; margin-top: 4px;
}
.timeline-line { flex: 1; width: 2px; background: var(--color-divider); margin-top: 2px; }
.timeline-item:last-child .timeline-line { display: none; }
.timeline-date { font-size: var(--text-xs); color: var(--color-text-faint); white-space: nowrap; min-width: 72px; padding-top: 2px; }
.timeline-body { flex: 1; }
.timeline-text { font-size: var(--text-sm); color: var(--color-text); line-height: 1.5; }
.timeline-tag { display: inline-block; font-size: var(--text-xs); padding: 1px 8px; border-radius: var(--radius-full); margin-bottom: var(--space-1); font-weight: 600; }

/* === HARVEST TABLE === */
.harvest-list { display: flex; flex-direction: column; gap: var(--space-2); }
.harvest-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-2) var(--space-3);
  background: var(--color-surface-offset);
  border-radius: var(--radius-md);
  gap: var(--space-3);
}
.harvest-date { font-size: var(--text-xs); color: var(--color-text-muted); min-width: 80px; }
.harvest-bar-wrap { flex: 1; height: 6px; background: var(--color-divider); border-radius: var(--radius-full); overflow: hidden; }
.harvest-bar { height: 100%; border-radius: var(--radius-full); background: var(--color-primary); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.harvest-val { font-size: var(--text-sm); font-weight: 600; font-variant-numeric: tabular-nums; color: var(--color-text); min-width: 60px; text-align: right; }

/* === WEATHER / GROWING PROGRESS === */
.progress-ring-wrap { display: flex; align-items: center; gap: var(--space-5); }
.progress-ring-label { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.5rem); font-variant-numeric: tabular-nums; }
.progress-ring-meta { font-size: var(--text-xs); color: var(--color-text-muted); }
.progress-ring-sub { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-2); }

/* === MINI CHART === */
.chart-wrap { position: relative; height: 160px; }

/* === NOTE TAG COLORS === */
.tag-observation { background: var(--color-blue-highlight); color: var(--color-blue); }
.tag-action { background: var(--color-primary-highlight); color: var(--color-primary); }
.tag-pest { background: var(--color-orange-highlight); color: var(--color-orange); }
.tag-harvest { background: var(--color-gold-highlight); color: var(--color-gold); }
.tag-milestone { background: var(--color-success-highlight); color: var(--color-success); }

/* === STAT PILLS === */
.stat-pills { display: flex; flex-wrap: wrap; gap: var(--space-2); }
.stat-pill {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface-offset);
  border-radius: var(--radius-full); font-size: var(--text-xs);
  color: var(--color-text-muted); font-weight: 500;
}
.stat-pill strong { color: var(--color-text); }

/* === MOBILE === */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .content { padding: var(--space-4); }
  .kpi-strip { grid-template-columns: repeat(2, 1fr); }
}

/* === TOOLTIP === */
.tooltip-wrap { position: relative; }
</style>
</head>

    <span class="plant-status-dot" style="background:#c08a00;" title="Harvesting"></span>
  </button>
</nav>

<!-- CONTENT -->
<main class="content" id="main-content">

</main>

</div><!-- .app -->

// ==================== RENDER ====================
let currentChart = null;

function statusBadge(status) {
  const map = {
    growing: ['badge-growing', 'Growing'],
    harvesting: ['badge-harvesting', '🌿 Harvesting'],
    done: ['badge-done', 'Season Complete'],
    seedling: ['badge-seedling', 'Seedling']
  };
  const [cls, label] = map[status] || ['badge-growing', status];
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function tagClass(type) {
  return `tag-${type}`;
}

function tagLabel(type) {
  return { observation: '👁 Note', action: '🛠 Action', pest: '⚠️ Pest', harvest: '🌾 Harvest', milestone: '🎯 Milestone' }[type] || type;
}

function daysSince(dateStr) {
  const d = new Date(dateStr);
  const now = new Date('2026-07-18');
  return Math.round((now - d) / 86400000);
}

function growthPercent(plant) {
  const days = daysSince(plant.plantedDate);
  return Math.min(100, Math.round((days / plant.daysToMaturity) * 100));
}

function plantedFormatted(dateStr) {
  return new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function renderPlant(key) {
  const p = plants[key];
  const maxHarv = p.harvests.length ? Math.max(...p.harvests.map(h => h.value)) : 1;
  const pct = growthPercent(p);

  const harvestRows = p.harvests.length
    ? p.harvests.map(h => {
        const w = Math.round((h.value / maxHarv) * 100);
        return `<div class="harvest-row">
          <span class="harvest-date">${h.date}</span>
          <div class="harvest-bar-wrap"><div class="harvest-bar" style="width:${w}%"></div></div>
          <span class="harvest-val">${h.value} ${h.unit}</span>
        </div>`;
      }).join('')
    : `<div style="color:var(--color-text-faint);font-size:var(--text-sm);padding:var(--space-4) 0;">No harvests yet — check back soon.</div>`;

  const timelineItems = [...p.notes].reverse().map(n => `
    <div class="timeline-item">
      <div class="timeline-track">
        <div class="timeline-dot" style="background:${p.color};"></div>
        <div class="timeline-line"></div>
      </div>
      <div class="timeline-date">${new Date(n.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      <div class="timeline-body">
        <span class="timeline-tag ${tagClass(n.type)}">${tagLabel(n.type)}</span>
        <div class="timeline-text">${n.text}</div>
      </div>
    </div>`).join('');

  // SVG ring
  const radius = 40, circ = 2 * Math.PI * radius;
  const dashOffset = circ - (pct / 100) * circ;

  document.getElementById('main-content').innerHTML = `
    <div class="plant-header">
      <div>
        <h1 class="plant-title">${p.name}</h1>
        <div class="plant-subtitle"><em>${p.variety}</em> &nbsp;·&nbsp; ${p.bed} &nbsp;·&nbsp; Planted ${plantedFormatted(p.plantedDate)}</div>
      </div>
      ${statusBadge(p.status)}
    </div>

    <!-- KPI strip -->
    <div class="kpi-strip">
      <div class="kpi-card">
        <div class="kpi-label">Total Harvest</div>
        <div class="kpi-value">${p.kpis.total}</div>
        <div class="kpi-delta delta-up"><i data-lucide="trending-up" style="width:12px;height:12px;"></i> ${p.kpis.sessions} sessions</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Days Growing</div>
        <div class="kpi-value">${daysSince(p.plantedDate)}</div>
        <div class="kpi-delta delta-neutral"><i data-lucide="calendar" style="width:12px;height:12px;"></i> ${p.daysToMaturity}d to maturity</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Avg / Session</div>
        <div class="kpi-value">${p.kpis.avgPerSession}</div>
        <div class="kpi-delta delta-up"><i data-lucide="activity" style="width:12px;height:12px;"></i> ${p.harvestUnit}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Growth Progress</div>
        <div class="kpi-value">${pct}%</div>
        <div class="kpi-delta delta-neutral"><i data-lucide="sprout" style="width:12px;height:12px;"></i> of maturity</div>
      </div>
    </div>

    <div class="two-col">
      <!-- Harvest Timeline Chart -->
      <div class="card">
        <div class="card-title"><i data-lucide="bar-chart-2" style="width:14px;height:14px;"></i> Harvest History</div>
        ${p.harvests.length
          ? `<div class="harvest-list">${harvestRows}</div>`
          : `<div style="color:var(--color-text-faint);font-size:var(--text-sm);padding:var(--space-8) 0 var(--space-4);text-align:center;">No harvest data yet</div>`
        }
      </div>

      <!-- Growth ring + chart -->
      <div class="card">
        <div class="card-title"><i data-lucide="trending-up" style="width:14px;height:14px;"></i> Season Progress</div>
        <div class="progress-ring-wrap">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="${radius}" fill="none" stroke="var(--color-divider)" stroke-width="9"/>
            <circle cx="50" cy="50" r="${radius}" fill="none" stroke="${p.color}" stroke-width="9"
              stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}"
              stroke-linecap="round" transform="rotate(-90 50 50)"
              style="transition: stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)"/>
            <text x="50" y="54" text-anchor="middle" font-family="var(--font-display)" font-size="18" fill="var(--color-text)">${pct}%</text>
          </svg>
          <div>
            <div class="progress-ring-label">${daysSince(p.plantedDate)}<span style="font-size:var(--text-sm);color:var(--color-text-muted);"> days</span></div>
            <div class="progress-ring-meta">since transplant</div>
            <div class="progress-ring-sub">${p.daysToMaturity - daysSince(p.plantedDate) > 0 ? `~${p.daysToMaturity - daysSince(p.plantedDate)} days to full maturity` : 'Past maturity date'}</div>
          </div>
        </div>

        <div style="margin-top:var(--space-5);">
          <div class="card-title" style="margin-bottom:var(--space-3);"><i data-lucide="layers" style="width:14px;height:14px;"></i> Harvest Trend</div>
          ${p.harvests.length > 1
            ? `<div class="chart-wrap"><canvas id="miniChart"></canvas></div>`
            : `<div style="color:var(--color-text-faint);font-size:var(--text-sm);text-align:center;padding:var(--space-6) 0;">Chart available after 2+ harvests</div>`
          }
        </div>
      </div>
    </div>

    <!-- Notes timeline -->
    <div class="full-col">
      <div class="card">
        <div class="card-title"><i data-lucide="notebook-pen" style="width:14px;height:14px;"></i> Garden Log</div>
        <div class="timeline">${timelineItems}</div>
      </div>
    </div>
  `;

  // Re-init Lucide icons
  lucide.createIcons();

  // Draw mini chart
  if (p.harvests.length > 1) {
    if (currentChart) { currentChart.destroy(); currentChart = null; }
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const textColor = isDark ? '#7a7876' : '#7a7974';
    const ctx = document.getElementById('miniChart').getContext('2d');
    currentChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: p.harvests.map(h => h.date),
        datasets: [{
          data: p.harvests.map(h => h.value),
          borderColor: p.color,
          backgroundColor: p.color + '22',
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: p.color,
          pointBorderColor: 'var(--color-surface)',
          pointBorderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 700, easing: 'easeOutQuart' },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.raw} ${p.harvestUnit}` } } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 } } },
          y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 } }, beginAtZero: true }
        }
      }
    });
  }
}

function selectPlant(key, btn) {
  document.querySelectorAll('.plant-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlant(key);
}

// Theme toggle
(function(){
  const toggle = document.querySelector('[data-theme-toggle]');
  const root = document.documentElement;
  let dark = matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme', dark ? 'dark' : 'light');
  function setIcon() {
    toggle.innerHTML = dark
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  }
  setIcon();
  toggle && toggle.addEventListener('click', () => {
    dark = !dark;
    root.setAttribute('data-theme', dark ? 'dark' : 'light');
    setIcon();
    // Redraw chart for theme
    const activeBtn = document.querySelector('.plant-btn.active');
    if (activeBtn) {
      const key = activeBtn.getAttribute('onclick').match(/'(\w+)'/)[1];
      renderPlant(key);
    }
  });
})();

// Initial render
renderPlant('tomato');
</script>
